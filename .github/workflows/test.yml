# .github/workflows/test.yml
name: Test Linux Router Lab

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install VirtualBox and Vagrant
        run: |
          sudo apt update
          sudo apt install -y virtualbox vagrant

      - name: Start VMs
        run: |
          vagrant up router --no-tty
          vagrant up client-a --no-tty
          vagrant up client-b --no-tty

      - name: Run tests
        run: bash test/test.sh

      - name: Destroy VMs
        if: always()
        run: vagrant destroy -f
