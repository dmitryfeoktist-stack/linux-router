# .github/workflows/test.yml
name: Test Linux Router Lab

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install VirtualBox 7.0 and Vagrant
        run: |
          sudo apt update
          sudo apt install -y wget
          wget -q https://www.virtualbox.org/download/oracle_vbox_2016.asc -O- | sudo apt-key add -
          echo "deb [arch=amd64] https://download.virtualbox.org/virtualbox/debian jammy contrib" | sudo tee /etc/apt/sources.list.d/virtualbox.list
          sudo apt-get update
          sudo apt-get install -y virtualbox-7.0
          sudo /sbin/vboxconfig
          sudo apt-get install -y vagrant

          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y vagrant

      - name: Start VMs
        run: |
          vagrant up --debug router --provider=virtualbox --no-tty
          vagrant up --debug client-a --provider=virtualbox --no-tty
          vagrant up --debug client-b --provider=virtualbox --no-tty

      - name: Show provisioning log (if failed)
        if: failure()
        run: |
          echo "=== Router provisioning log ==="
          vagrant ssh router -c "cat /tmp/router-provision.log" 2>/dev/null || echo "No log file found"
          echo "=== Client-A provisioning log (if any) ==="
          vagrant ssh client-a -c "cat /tmp/client-provision.log" 2>/dev/null || true
      - name: Debug network on router and clients
        run: |
          echo "=== Router network interfaces ==="
          vagrant ssh router -c "ip a"
          echo "=== Router default route ==="
          vagrant ssh router -c "ip route show default"
          echo "=== Router ping 10.0.2.2 (NAT gateway) ==="
          vagrant ssh router -c "ping -c 2 10.0.2.2" || true
          echo "=== Router ping 8.8.8.8 ==="
          vagrant ssh router -c "ping -c 2 8.8.8.8" || true
          echo "=== Router iptables NAT ==="
          vagrant ssh router -c "sudo iptables -t nat -L POSTROUTING -n -v" || true
          echo "=== Router iptables FORWARD ==="
          vagrant ssh router -c "sudo iptables -L FORWARD -n -v" || true
          echo "=== Client-A default route ==="
          vagrant ssh client-a -c "ip route show default" || true
          echo "=== Client-A ping router ==="
          vagrant ssh client-a -c "ping -c 2 192.168.100.1" || true
          echo "=== Client-A ping 8.8.8.8 ==="
          vagrant ssh client-a -c "ping -c 2 8.8.8.8" || true

      - name: Run tests
        run: bash test/test.sh

      - name: Destroy VMs
        if: always()
        run: vagrant destroy -f
